services:
  - type: web
    name: sales-app
    env: python
    plan: free
    branch: feat/sales-app-prototype   # or change to main if you prefer
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --workers 2 --threads 4 --timeout 120 -b 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9      # must be major.minor.patch
      - key: FLASK_ENV
        value: production
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
