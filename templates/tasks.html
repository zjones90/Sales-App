<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-swimmer me-2"></i>Pool Sales App
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="fas fa-map-location-dot me-1"></i>Map</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/leads"><i class="fas fa-funnel-dollar me-1"></i>Leads</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/tasks"><i class="fas fa-tasks me-1"></i>Tasks</a>
                    </li>
                </ul>
            </div>
        </div>
    </header>
    <main class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Tasks</h2>
            <div class="task-filters d-flex gap-2 align-items-center">
                <input type="text" id="task-search-input" class="form-control" placeholder="Search tasks...">
                <select id="task-filter-select" class="form-select">
                    <option value="all">All Active</option>
                    <option value="due_today">Due Today</option>
                    <option value="overdue">Overdue</option>
                    <option value="all_tasks">All Tasks (including completed)</option>
                </select>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="show-completed-tasks-checkbox">
                    <label class="form-check-label" for="show-completed-tasks-checkbox">Show Completed</label>
                </div>
            </div>
        </div>
        <div class="task-list-container">
            <!-- Add Task Form -->
            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title">Add New Task</h5>
                    <form id="add-task-form">
                        <div class="mb-3">
                            <label for="task-title" class="form-label">Title</label>
                            <input type="text" class="form-control" id="task-title" required>
                        </div>
                        <div class="mb-3">
                            <label for="task-details" class="form-label">Details</label>
                            <textarea class="form-control" id="task-details" rows="2"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="task-due-date" class="form-label">Due Date</label>
                                <input type="date" class="form-control" id="task-due-date">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="task-lead-search" class="form-label">Link to Lead</label>
                                <input type="text" class="form-control" id="task-lead-search" placeholder="Start typing to search...">
                                <input type="hidden" id="task-lead-id">
                                <div id="lead-suggestions" class="list-group position-absolute" style="z-index: 1000;"></div>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Add Task</button>
                    </form>
                </div>
            </div>

            <!-- Task List -->
            <div class="task-list">
                <!-- Tasks will be populated here by tasks.js -->
            </div>
        </div>
    </main>
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/tasks.js"></script>
</body>
</html>
