<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-swimmer me-2"></i>Pool Sales App
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="fas fa-map-location-dot me-1"></i>Map</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/leads"><i class="fas fa-funnel-dollar me-1"></i>Leads</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/tasks"><i class="fas fa-tasks me-1"></i>Tasks</a>
                    </li>
                </ul>
            </div>
        </div>
    </header>
    <main class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Tasks</h2>
            <div class="task-filters d-flex gap-2 align-items-center">
                <input type="text" id="task-search-input" class="form-control" placeholder="Search tasks...">
                <select id="task-filter-select" class="form-select">
                    <option value="all">All Active</option>
                    <option value="due_today">Due Today</option>
                    <option value="overdue">Overdue</option>
                    <option value="no_due_date">No Due Date</option>
                    <option value="all_tasks">All Tasks (including completed)</option>
                </select>
                <button id="show-completed-tasks-toggle" class="btn btn-outline-secondary" title="Show/Hide Completed Tasks">
                    <i class="fas fa-check-circle"></i>
                </button>
            </div>
        </div>
        <div class="task-list-container">
            <!-- Task List -->
            <div class="task-list">
                <!-- Tasks will be populated here by tasks.js -->
            </div>
        </div>
    </main>

    <button id="add-task-fab" class="btn btn-primary fab" title="Add New Task">
        <i class="fas fa-plus"></i>
    </button>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/tasks.js"></script>

    <!-- Add Task Modal -->
    <div class="modal fade" id="add-task-modal" tabindex="-1" aria-labelledby="addTaskModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addTaskModalLabel">Add New Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="add-task-form">
                        <div class="mb-3">
                            <label for="task-title" class="form-label">Title</label>
                            <input type="text" class="form-control" id="task-title" required>
                        </div>
                        <div class="mb-3">
                            <label for="task-details" class="form-label">Details</label>
                            <textarea class="form-control" id="task-details" rows="2"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="task-due-date" class="form-label">Due Date</label>
                                <input type="date" class="form-control" id="task-due-date">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="task-lead-search" class="form-label">Link to Lead</label>
                                <input type="text" class="form-control" id="task-lead-search" placeholder="Start typing to search...">
                                <input type="hidden" id="task-lead-id">
                                <div id="lead-suggestions" class="list-group position-absolute" style="z-index: 1050;"></div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" form="add-task-form" class="btn btn-primary">Add Task</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Task Modal -->
    <div class="modal fade" id="edit-task-modal" tabindex="-1" aria-labelledby="editTaskModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editTaskModalLabel">Edit Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="edit-task-form">
                        <input type="hidden" id="edit-task-id">
                        <div class="mb-3">
                            <label for="edit-task-title" class="form-label">Title</label>
                            <input type="text" class="form-control" id="edit-task-title" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit-task-details" class="form-label">Details</label>
                            <textarea class="form-control" id="edit-task-details" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="edit-task-due-date" class="form-label">Due Date</label>
                            <input type="date" class="form-control" id="edit-task-due-date">
                        </div>
                         <div class="mb-3">
                            <label for="edit-task-lead-search" class="form-label">Link to Lead</label>
                            <input type="text" class="form-control" id="edit-task-lead-search" placeholder="Start typing to search...">
                            <input type="hidden" id="edit-task-lead-id">
                            <div id="edit-lead-suggestions" class="list-group position-absolute" style="z-index: 1050;"></div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" form="edit-task-form" class="btn btn-primary">Save Changes</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
