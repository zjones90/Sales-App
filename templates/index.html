<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool Sales Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        #filter-container {
            position: absolute;
            top: 90px;
            right: 10px;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.65);
            z-index: 800; /* Ensure it's above the map */
        }
        #filter-container h4 {
            margin: 0 0 5px 0;
        }
        #filter-container .filter-option {
            display: block;
        }
        /* Modal Styles */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
        }
        .modal-content h3 {
            margin-top: 0;
        }
        .modal-content label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        .modal-actions {
            margin-top: 20px;
            text-align: right;
        }
        .modal-actions button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-save {
            background-color: #28a745;
            color: white;
        }
        .btn-cancel {
            background-color: #ccc;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Pool Sales App</h1>
        <nav>
            <a href="/">Map</a>
            <a href="/leads">Leads</a>
        </nav>
    </header>
    <main>
        <div id="map"></div>
        <div id="custom-controls-container">
            <button id="center-button" title="Center on me">🎯</button>
            <div id="search-wrapper">
                <button id="search-icon">🔍</button>
                <input type="text" id="search-input" placeholder="Enter address" style="display: none;">
                <div id="search-suggestions"></div>
            </div>
        </div>
        <div id="filter-control-container">
            <button id="filter-button">Filter</button>
            <div id="filter-panel" style="display: none;">
                <h4>Filter by Status</h4>
                <div id="filter-options">
                    <!-- Checkboxes will be populated here by map.js -->
                </div>
            </div>
        </div>
    </main>

    <!-- Add Lead Modal -->
    <div id="add-modal" class="modal-backdrop" style="display:none;">
        <div class="modal-content">
            <h3>Add New Lead</h3>
            <form id="add-form">
                <input type="hidden" id="add-lat">
                <input type="hidden" id="add-lng">
                <label for="add-name">Name:</label>
                <input type="text" id="add-name" required>
                <label for="add-phone">Phone:</label>
                <input type="tel" id="add-phone">
                <label for="add-address">Address:</label>
                <input type="text" id="add-address">
                <div id="address-suggestions"></div>
                 <div class="modal-actions">
                    <button type="submit" class="btn-save">Save Lead</button>
                    <button type="button" class="btn-cancel" onclick="closeAddModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Lead Modal -->
    <div id="edit-modal" class="modal-backdrop" style="display:none;">
        <div class="modal-content">
            <h3>Edit Lead</h3>
            <form id="edit-form">
                <input type="hidden" id="edit-lead-id">
                <label for="edit-name">Name:</label>
                <input type="text" id="edit-name" required>
                <label for="edit-phone">Phone:</label>
                <input type="tel" id="edit-phone">
                <label for="edit-address">Address:</label>
                <input type="text" id="edit-address">
                <label for="edit-notes">Notes:</label>
                <textarea id="edit-notes" rows="4"></textarea>
                <label for="edit-status">Status:</label>
                <select id="_status">
                    <!-- Options will be generated dynamically by map.js -->
                </select>
                <div class="modal-actions">
                    <button type="submit" class="btn-save">Save Changes</button>
                    <button type="button" class="btn-cancel" onclick="closeEditModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
    <!-- App's Map JS -->
    <script src="/static/js/map.js"></script>
</body>
</html>
