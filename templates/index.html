<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool Sales Map</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-swimmer me-2"></i>Pool Sales App
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="/"><i class="fas fa-map-location-dot me-1"></i>Map</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/leads"><i class="fas fa-funnel-dollar me-1"></i>Leads</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/tasks"><i class="fas fa-tasks me-1"></i>Tasks</a>
                    </li>
                </ul>
            </div>
        </div>
    </header>
    <main class="container-fluid mt-4">
        <div id="map"></div>
        <div id="custom-controls-container">
            <button id="center-button" class="btn btn-light" title="Center on me"><i class="fas fa-location-crosshairs"></i></button>
            <div id="search-wrapper" class="input-group">
                <button id="search-icon" class="btn btn-light"><i class="fas fa-search"></i></button>
                <input type="text" id="search-input" class="form-control" placeholder="Search by name, phone, or address..." style="display: none;">
                <div id="search-suggestions" class="list-group position-absolute"></div>
            </div>
        </div>
        <div id="filter-control-container">
            <button id="filter-button" class="btn btn-light">
                <i class="fas fa-filter me-1"></i>Filter
            </button>
            <div id="filter-panel" class="card" style="display: none;">
                <div class="card-body">
                    <h5 class="card-title">Filter by Status</h5>
                    <div id="filter-options">
                        <!-- Checkboxes will be populated here by map.js -->
                    </div>
                    <hr>
                    <h5 class="card-title">Filter by Created Date</h5>
                    <div class="mb-3">
                        <label for="start-date" class="form-label">Start Date:</label>
                        <input type="date" id="start-date" name="start-date" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="end-date" class="form-label">End Date:</label>
                        <input type="date" id="end-date" name="end-date" class="form-control">
                    </div>
                </div>
            </div>
        </div>
        <button id="add-lead-fab-map" class="btn btn-primary fab" title="Add New Lead at Map Center">
            <i class="fas fa-plus"></i>
        </button>
    </main>

    <!-- Add Lead Modal -->
    <div class="modal fade" id="add-modal" tabindex="-1" aria-labelledby="addModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addModalLabel">Add New Lead</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="add-form">
                        <input type="hidden" id="add-lat">
                        <input type="hidden" id="add-lng">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="add-first-name" class="form-label">First Name:</label>
                                <input type="text" id="add-first-name" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="add-last-name" class="form-label">Last Name:</label>
                                <input type="text" id="add-last-name" class="form-control">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="add-phone" class="form-label">Phone:</label>
                            <input type="tel" id="add-phone" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="add-address" class="form-label">Address:</label>
                            <input type="text" id="add-address" class="form-control" required>
                            <div id="address-suggestions" class="list-group"></div>
                        </div>
                        <div class="mb-3">
                            <label for="add-lead-source" class="form-label">Lead Source:</label>
                            <select id="add-lead-source" class="form-select">
                                <option selected>Other</option>
                                <option>Facebook</option>
                                <option>Website</option>
                                <option>Home Show</option>
                                <option>Referral</option>
                                <option>Doors</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" form="add-form" class="btn btn-primary">Save Lead</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Lead Modal -->
    <div class="modal fade" id="edit-modal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalLabel">Edit Lead</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="edit-form">
                        <input type="hidden" id="edit-lead-id">
                        <div class="mb-3">
                            <label for="edit-name" class="form-label">Name:</label>
                            <input type="text" id="edit-name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit-phone" class="form-label">Phone:</label>
                            <input type="tel" id="edit-phone" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="edit-address" class="form-label">Address:</label>
                            <input type="text" id="edit-address" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="edit-notes" class="form-label">Notes:</label>
                            <textarea id="edit-notes" rows="4" class="form-control"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="edit-status" class="form-label">Status:</label>
                            <select id="_status" class="form-select">
                                <!-- Options will be generated dynamically by map.js -->
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" id="delete-lead-btn" class="btn btn-danger me-auto">Delete</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" form="edit-form" class="btn btn-primary">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Pin Drag Modal -->
    <div class="modal fade" id="pin-drag-modal" tabindex="-1" aria-labelledby="pinDragModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="pinDragModalLabel">Update Pin Location</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>You moved the pin to a new location. What would you like to do?</p>
                    <p><strong>New Address:</strong> <span id="new-address-text"></span></p>
                </div>
                <div class="modal-footer">
                    <button type="button" id="pin-drag-cancel" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" id="pin-drag-move-only" class="btn btn-primary">Move Pin Only</button>
                    <button type="button" id="pin-drag-update-address" class="btn btn-primary">Update Address & Move</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Shared Utilities -->
    <script src="/static/js/utils.js"></script>
    <!-- App's Map JS -->
    <script src="/static/js/map.js"></script>
</body>
</html>
