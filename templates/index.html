<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool Sales Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <!-- Leaflet Geosearch CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-geosearch@4.0.0/dist/geosearch.css" />
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        #filter-container {
            position: absolute;
            top: 90px;
            right: 10px;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.65);
            z-index: 800; /* Ensure it's above the map */
        }
        #filter-container h4 {
            margin: 0 0 5px 0;
        }
        #filter-container .filter-option {
            display: block;
        }
    </style>
</head>
<body>
    <header>
        <h1>Pool Sales App</h1>
        <nav>
            <a href="/">Map</a>
            <a href="/leads">Leads</a>
        </nav>
    </header>
    <main>
        <div id="map"></div>
        <div id="filter-container">
            <h4>Filter by Status</h4>
            <div class="filter-option"><label><input type="checkbox" name="status" value="New" checked> New</label></div>
            <div class="filter-option"><label><input type="checkbox" name="status" value="Contacted" checked> Contacted</label></div>
            <div class="filter-option"><label><input type="checkbox" name="status" value="Site Visit Scheduled" checked> Site Visit Scheduled</label></div>
            <div class="filter-option"><label><input type="checkbox" name="status" value="Quote Sent" checked> Quote Sent</label></div>
            <div class="filter-option"><label><input type="checkbox" name="status" value="Won" checked> Won</label></div>
            <div class="filter-option"><label><input type="checkbox" name="status" value="Lost" checked> Lost</label></div>
        </div>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
    <!-- Leaflet Geosearch JS -->
    <script src="https://unpkg.com/leaflet-geosearch@4.0.0/dist/geosearch.umd.js"></script>
    <!-- App's Map JS -->
    <script src="/static/js/map.js"></script>
</body>
</html>
