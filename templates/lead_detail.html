<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Details</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-swimmer me-2"></i>Pool Sales App
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="fas fa-map-location-dot me-1"></i>Map</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/leads"><i class="fas fa-funnel-dollar me-1"></i>Leads</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/tasks"><i class="fas fa-tasks me-1"></i>Tasks</a>
                    </li>
                </ul>
            </div>
        </div>
    </header>
    <main class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="mb-0">Lead Details</h1>
            <div class="d-flex gap-2">
                <button type="submit" form="lead-form" class="btn btn-primary" title="Save Changes">
                    <i class="fas fa-save"></i><span class="ms-2 d-none d-md-inline">Save</span>
                </button>
                <button id="snooze-lead-btn" type="button" class="btn btn-outline-secondary" title="Snooze Lead">
                    <i class="fas fa-clock"></i><span class="ms-2 d-none d-md-inline">Snooze</span>
                </button>
                <a id="view-on-map-btn" href="#" class="btn btn-outline-secondary" title="View on Map">
                    <i class="fas fa-map-location-dot"></i><span class="ms-2 d-none d-md-inline">View on Map</span>
                </a>
                <button id="adjust-pin-btn" type="button" class="btn btn-outline-secondary" title="Adjust pin to match address">
                    <i class="fas fa-map-pin"></i><span class="ms-2 d-none d-md-inline">Adjust Pin</span>
                </button>
                <div class="dropdown">
                    <button class="btn btn-outline-secondary dropdown-toggle" type="button" id="more-actions-dropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fas fa-ellipsis-v"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="more-actions-dropdown">
                        <li><a class="dropdown-item text-danger" href="#" id="delete-lead-btn">
                            <i class="fas fa-trash-alt me-2"></i>Delete Lead
                        </a></li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title mb-4">Lead Information</h5>
                        <form id="lead-form">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="lead-first-name" class="form-label">First Name</label>
                                    <input type="text" class="form-control" id="lead-first-name" name="first_name">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="lead-last-name" class="form-label">Last Name</label>
                                    <input type="text" class="form-control" id="lead-last-name" name="last_name">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="lead-phone" class="form-label">Phone</label>
                                <div class="input-group">
                                    <input type="tel" class="form-control" id="lead-phone" name="phone">
                                    <a id="call-btn" href="#" class="btn btn-outline-secondary" title="Call">
                                        <i class="fas fa-phone"></i>
                                    </a>
                                    <a id="text-btn" href="#" class="btn btn-outline-secondary" title="Text">
                                        <i class="fas fa-comment-sms"></i>
                                    </a>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="lead-address" class="form-label">Address</label>
                                <input type="text" class="form-control" id="lead-address" name="address" autocomplete="off">
                                <div id="address-suggestions-detail" class="address-suggestions list-group"></div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="lead-status" class="form-label">Status</label>
                                    <select id="lead-status" name="status" class="form-select"></select>
                                </div>
                            </div>
                             <div class="mt-4">
                                <a href="/leads" class="btn btn-secondary">
                                    <i class="fas fa-arrow-left me-2"></i>Back to Leads
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title">Details</h5>
                        <div class="mb-3">
                            <label class="form-label">Created Date</label>
                            <p id="lead-created-at" class="form-control-plaintext">Loading...</p>
                        </div>
                        <div id="snooze-status-container" style="display: none;">
                            <label class="form-label">Snooze Status</label>
                            <p id="snooze-status-text" class="form-control-plaintext"></p>
                        </div>
                    </div>
                </div>

                <div class="card">
                     <div class="card-body">
                        <h5 class="card-title mb-3">Tasks</h5>
                        <ul id="tasks-list" class="list-group list-group-flush"></ul>
                        <form id="add-task-form" class="mt-3 d-flex gap-2">
                            <input type="text" id="task-title" class="form-control" placeholder="New task..." required>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-plus"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Activity Log</h5>
                    <ul id="notes-list" class="list-group list-group-flush"></ul>
                     <form id="add-note-form" class="mt-3">
                        <div class="mb-3">
                            <textarea id="note-text" class="form-control" rows="3" placeholder="Log a call, text, or meeting..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="note-attachment" class="form-label">Attachment</label>
                            <input type="file" class="form-control" id="note-attachment" name="attachment">
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-plus-circle me-2"></i>Add Note
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script>
        // Pass the lead_id from Flask template to the JS script
        const LEAD_ID = "{{ lead_id }}";
    </script>
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/lead_detail.js"></script>

    <!-- Snooze Modal -->
    <div class="modal fade" id="snooze-modal" tabindex="-1" aria-labelledby="snoozeModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="snoozeModalLabel">Snooze Lead</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Snooze for a number of days, or until a specific date.</p>
                    <div class="mb-3">
                        <label for="snooze-days" class="form-label">Snooze for (days):</label>
                        <input type="number" id="snooze-days" class="form-control" min="1" placeholder="e.g., 7">
                    </div>
                    <div class="mb-3">
                        <label for="snooze-date" class="form-label">Snooze until:</label>
                        <input type="date" id="snooze-date" class="form-control">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancel-snooze-modal" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="confirm-snooze-btn">Snooze</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
