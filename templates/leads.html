<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Funnel</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <h1>Pool Sales App</h1>
        <nav>
            <a href="/">Map</a>
            <a href="/leads">Leads</a>
        </nav>
    </header>
    <main>
        <h2>Leads Funnel</h2>
        <div id="kanban-board">
            <div class="kanban-column" id="new-leads" data-status="New">
                <h3>New</h3>
            </div>
            <div class="kanban-column" id="contacted-leads" data-status="Contacted">
                <h3>Contacted</h3>
            </div>
            <div class="kanban-column" id="measured-leads" data-status="Measured">
                <h3>Measured</h3>
            </div>
            <div class="kanban-column" id="presented-leads" data-status="Presented">
                <h3>Presented</h3>
            </div>
            <div class="kanban-column" id="signed-leads" data-status="Signed">
                <h3>Signed</h3>
            </div>
            <div class="kanban-column" id="dug-leads" data-status="Dug">
                <h3>Dug</h3>
            </div>
            <div class="kanban-column" id="completed-leads" data-status="Completed">
                <h3>Completed</h3>
            </div>
            <div class="kanban-column" id="lost-leads" data-status="Lost">
                <h3>Lost</h3>
            </div>
        </div>
    </main>
    <script src="/static/js/leads.js"></script>
</body>
</html>
