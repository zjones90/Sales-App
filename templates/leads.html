<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Funnel</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-swimmer me-2"></i>Pool Sales App
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="fas fa-map-location-dot me-1"></i>Map</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/leads"><i class="fas fa-funnel-dollar me-1"></i>Leads</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/tasks"><i class="fas fa-tasks me-1"></i>Tasks</a>
                    </li>
                </ul>
            </div>
        </div>
    </header>
    <main class="container-fluid mt-4">
        <div class="funnel-header">
            <h2 class="mb-0">Leads Funnel</h2>
            <div class="ms-auto d-flex align-items-center gap-2">
                <button id="hot-leads-filter-btn" class="btn btn-outline-secondary" title="Filter Hot Leads">
                    <i class="fas fa-fire"></i>
                </button>
                <input type="text" id="lead-search-input" class="form-control" placeholder="Search leads...">
                <input type="date" id="start-date-filter" class="form-control">
                <input type="date" id="end-date-filter" class="form-control">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="show-snoozed-checkbox">
                    <label class="form-check-label" for="show-snoozed-checkbox">Show Snoozed</label>
                </div>
            </div>
        </div>
        <div id="kanban-board" class="mt-3">
            <!-- Columns will be generated dynamically by leads.js -->
        </div>
        <button id="add-lead-fab" class="btn btn-primary fab" title="Add New Lead">
            <i class="fas fa-plus"></i>
        </button>
    </main>

    <!-- Add Lead Modal -->
    <div class="modal fade" id="add-modal" tabindex="-1" aria-labelledby="addModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addModalLabel">Add New Lead</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="add-form">
                        <input type="hidden" id="add-lat">
                        <input type="hidden" id="add-lng">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="add-first-name" class="form-label">First Name:</label>
                                <input type="text" id="add-first-name" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="add-last-name" class="form-label">Last Name:</label>
                                <input type="text" id="add-last-name" class="form-control">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="add-phone" class="form-label">Phone:</label>
                            <input type="tel" id="add-phone" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="add-address" class="form-label">Address:</label>
                            <input type="text" id="add-address" class="form-control" required>
                            <div id="address-suggestions" class="list-group"></div>
                        </div>
                        <div class="mb-3">
                            <label for="add-lead-source" class="form-label">Lead Source:</label>
                            <select id="add-lead-source" class="form-select">
                                <option selected>Other</option>
                                <option>Facebook</option>
                                <option>Website</option>
                                <option>Home Show</option>
                                <option>Referral</option>
                                <option>Doors</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" form="add-form" class="btn btn-primary">Save Lead</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Snooze Modal -->
    <div class="modal fade" id="snooze-modal" tabindex="-1" aria-labelledby="snoozeModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="snoozeModalLabel">Snooze Lead</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Snooze for a number of days, or until a specific date.</p>
                    <div class="mb-3">
                        <label for="snooze-days" class="form-label">Snooze for (days):</label>
                        <input type="number" id="snooze-days" class="form-control" min="1" placeholder="e.g., 7">
                    </div>
                    <div class="mb-3">
                        <label for="snooze-date" class="form-label">Snooze until:</label>
                        <input type="date" id="snooze-date" class="form-control">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="confirm-snooze-btn">Snooze</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/leads.js"></script>
</body>
</html>
